services:
  db:
    image: postgres:16-alpine
    container_name: asys-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asys}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - asys-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-asys}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: asys-api
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-asys}?schema=public
      JWT_SECRET: ${JWT_SECRET:-gelistirme-icin-degistir}
      WEB_ORIGIN: http://localhost:3000
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: asys-web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: asys-worker
    environment:
      NODE_ENV: development
      WORKER_TICK_MS: ${WORKER_TICK_MS:-30000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-asys}?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  asys-db-data:
